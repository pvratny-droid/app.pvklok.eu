  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- C3HUB sdílený design -->

  <style>
    .md-content { padding-top: 8px; padding-bottom: 64px; }
    .md-heading { font-size: 1.6rem; margin-bottom: 6px; color: var(--c3-text); }
    .md-subheading { color: var(--c3-text-muted); margin-bottom: 22px; font-size: 0.9375rem; }

    .md-toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
    .md-toolbar .md-search { flex: 1; min-width: 260px; max-width: 440px; }
    .md-count { color: var(--c3-text-muted); font-size: 0.875rem; margin-bottom: 10px; }
    .md-ro-note {
      background: #f4f8fc; border-left: 4px solid var(--c3-primary);
      padding: 8px 14px; border-radius: var(--c3-radius-sm);
      font-size: 0.8125rem; color: var(--c3-text-muted); margin-bottom: 14px;
    }
    .md-st-chip {
      display: inline-block; font-size: 0.6875rem; font-weight: 700;
      background: var(--c3-primary-hover); color: var(--c3-primary);
      padding: 1px 7px; border-radius: var(--c3-radius-sm); letter-spacing: 0.03em;
    }

    /* Dialog – pomocné */
    .md-help {
      background: #f4f8fc; border-left: 3px solid var(--c3-primary);
      padding: 8px 12px; margin-bottom: 14px; font-size: 0.8125rem; color: var(--c3-text-muted);
    }
    .md-rel-note {
      margin-top: 8px; font-size: 0.75rem; color: var(--c3-text-muted); font-style: italic;
    }
    .md-field-error { font-size: 0.75rem; color: var(--c3-error); margin-top: 4px; font-weight: 500; }
    .c3-form-input.invalid, .c3-form-select.invalid, .c3-form-textarea.invalid { border-color: var(--c3-error); }
    .md-radio-group { display: flex; gap: 18px; margin-bottom: 14px; }
    .md-radio { display: inline-flex; align-items: center; gap: 6px; font-size: 0.9375rem; cursor: pointer; }

    /* Záložkový panel vztahů (G063a) */
    .md-rel-tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--c3-divider); margin-bottom: 12px; flex-wrap: wrap; }
    .md-rel-tab {
      background: none; border: none; padding: 8px 14px; cursor: pointer;
      font-weight: 700; font-size: 0.875rem; color: var(--c3-text-muted);
      border-bottom: 2px solid transparent; margin-bottom: -2px;
    }
    .md-rel-tab:hover { color: var(--c3-primary); }
    .md-rel-tab.active { color: var(--c3-primary); border-bottom-color: var(--c3-primary); }
    .md-rel-tab__count {
      display: inline-block; min-width: 18px; padding: 0 5px;
      background: var(--c3-primary-hover); color: var(--c3-primary);
      border-radius: var(--c3-radius-full); font-size: 0.6875rem; margin-left: 2px;
    }
    .md-rel-toolbar { margin-bottom: 10px; }

    .md-rel-table { width: 100%; border-collapse: collapse; border: 1px solid var(--c3-divider); }
    .md-rel-table th {
      background: #e0e0e0; color: #333; font-size: 0.8125rem; font-weight: 700;
      text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--c3-divider);
    }
    .md-rel-table td { padding: 6px 10px; border-bottom: 1px solid #f0f0f0; font-size: 0.875rem; color: var(--c3-text); }
    .md-rel-row--add td { background: #e8f5e9; }
    .md-rel-row--del td { background: #ffebee; text-decoration: line-through; color: var(--c3-text-muted); }
    .md-rel-new {
      font-size: 0.625rem; font-weight: 700; background: var(--c3-success); color: #fff;
      padding: 1px 5px; border-radius: var(--c3-radius-sm);
    }
    .md-rel-type { font-weight: 700; color: var(--c3-primary); font-size: 0.8125rem; }
    .md-rel-table--add { border-color: var(--c3-success); }
    .md-rel-table--del { border-color: var(--c3-error); }

    /* Souhrn (G070) */
    .md-summary-h { font-size: 0.9375rem; margin: 16px 0 8px; }
    .md-summary-h:first-child { margin-top: 0; }
    .md-summary-h--add { color: #2e7d32; }
    .md-summary-h--del { color: var(--c3-error); }
    .md-summary-empty {
      padding: 14px; background: #fafafa; border: 1px dashed var(--c3-border);
      border-radius: var(--c3-radius-sm); color: var(--c3-text-muted);
      font-style: italic; font-size: 0.875rem;
    }

    /* Detail patch requestu */
    .md-pr-meta {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px 24px;
      margin-bottom: 8px; padding: 12px 14px; background: #fafbfc;
      border: 1px solid var(--c3-border); border-radius: var(--c3-radius-sm);
    }
    .md-pr-meta__l { display: block; font-size: 0.6875rem; color: var(--c3-text-muted); font-weight: 700; text-transform: uppercase; }

    /* Metamodel obrázky */
    .md-mm-desc { color: var(--c3-text); font-size: 0.9375rem; margin-bottom: 14px; }
    .md-mm-image {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; padding: 48px; background: #fafbfc;
      border: 2px dashed var(--c3-border); border-radius: var(--c3-radius-md);
      color: var(--c3-text-muted);
    }
    .md-mm-image i { font-size: 3rem; color: var(--c3-primary); opacity: 0.5; }
    .md-mm-image__name { font-family: monospace; font-size: 0.875rem; }
    .md-mm-image__hint { font-size: 0.75rem; font-style: italic; }

    /* Vnořené modály */
    .c3-modal-backdrop.nested { background: rgba(0,0,0,0.35); }
