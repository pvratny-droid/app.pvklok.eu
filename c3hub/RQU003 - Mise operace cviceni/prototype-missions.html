  <style>
    .mi-content { padding-top: 8px; padding-bottom: 64px; }
    .mi-page-heading { font-size: 1.6rem; margin-bottom: 18px; color: var(--c3-text); }
    .mi-empty {
      padding: 40px; text-align: center; color: var(--c3-text-muted);
      font-style: italic; background: #fff; border-radius: var(--c3-radius-md);
    }

    /* Karta mise */
    .mi-card-types {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.03em;
      color: var(--c3-primary); text-transform: uppercase; margin-bottom: 6px;
    }
    .mi-card .c3-simple-card__color-block { height: 130px; }
    .mi-card .c3-simple-card__color-block .label { font-size: 1.35rem; -webkit-line-clamp: 2; }
    .mi-card .c3-simple-card__actions { flex-wrap: wrap; }

    /* Detail – sekce Detaily */
    .mi-detail-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    @media (max-width: 800px) { .mi-detail-grid { grid-template-columns: 1fr; } }
    .mi-detail-field__label { font-size: 0.75rem; font-weight: 500; color: var(--c3-text-muted); margin-bottom: 4px; }
    .mi-detail-field__value { color: var(--c3-text); font-size: 0.9375rem; }

    /* Plánování */
    .mi-pov-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 16px; }
    .mi-pov-hint {
      background: #f4f8fc; border-left: 4px solid var(--c3-primary);
      padding: 10px 14px; border-radius: var(--c3-radius-sm);
      font-size: 0.875rem; color: var(--c3-text-muted);
    }
    .mi-tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--c3-divider); margin-bottom: 16px; }
    .mi-tab {
      background: none; border: none; padding: 10px 18px;
      font-weight: 700; font-size: 0.9375rem; color: var(--c3-text-muted);
      border-bottom: 2px solid transparent; margin-bottom: -2px; cursor: pointer;
    }
    .mi-tab:hover { color: var(--c3-primary); }
    .mi-tab.active { color: var(--c3-primary); border-bottom-color: var(--c3-primary); }

    .mi-mode-row { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
    .mi-radio { display: inline-flex; align-items: center; gap: 6px; font-size: 0.9375rem; cursor: pointer; }
    .mi-radio--disabled { color: var(--c3-text-disabled); cursor: not-allowed; }
    .mi-disabled-tag {
      font-size: 0.6875rem; font-weight: 700; background: #f0f0f0;
      color: var(--c3-text-muted); padding: 1px 6px; border-radius: var(--c3-radius-sm);
    }

    /* Grid toolbar */
    .mi-grid-toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
    .mi-grid-toolbar .c3-tree-toolbar { margin-bottom: 0; }

    /* Role buňky v plánovacím gridu */
    .mi-role-on { color: var(--c3-success); }
    .mi-role-off { color: var(--c3-text-disabled); }
    .mi-pace-badge {
      display: inline-block; font-size: 0.6875rem; font-weight: 700;
      background: var(--c3-primary-hover); color: var(--c3-primary);
      padding: 1px 6px; border-radius: var(--c3-radius-sm); letter-spacing: 0.02em;
    }

    /* C2 záložka */
    .mi-c2-group { margin-bottom: 20px; }
    .mi-c2-heading { font-size: 1rem; color: var(--c3-text); margin-bottom: 8px; }
    .mi-c2-type { font-weight: 700; color: var(--c3-primary); }

    /* Patička detailu */
    .mi-detail-footer {
      display: flex; justify-content: flex-end; gap: 8px;
      padding-top: 16px; margin-top: 4px;
    }

    /* Dialogy – pomocné */
    .mi-help {
      background: #f4f8fc; border-left: 3px solid var(--c3-primary);
      padding: 8px 12px; margin-bottom: 14px; font-size: 0.8125rem; color: var(--c3-text-muted);
    }
    .mi-field-error { font-size: 0.75rem; color: var(--c3-error); margin-top: 4px; font-weight: 500; }
    .c3-form-input.invalid, .c3-form-select.invalid, .c3-form-textarea.invalid { border-color: var(--c3-error); }
    .mi-chk-list {
      display: flex; flex-direction: column; gap: 4px;
      max-height: 180px; overflow-y: auto;
      border: 1px solid var(--c3-border); border-radius: var(--c3-radius-sm); padding: 8px;
    }
    .mi-chk { display: inline-flex; align-items: center; gap: 6px; font-size: 0.9375rem; cursor: pointer; }

    /* G055 grid v dialogu G054 */
    .mi-g018-wrap { margin-top: 8px; }
    .mi-g018 { width: 100%; border-collapse: collapse; border: 1px solid var(--c3-divider); }
    .mi-g018 th {
      background: #e0e0e0; color: #333; font-size: 0.8125rem; font-weight: 700;
      text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--c3-divider);
    }
    .mi-g018 td { padding: 6px 10px; border-bottom: 1px solid #f0f0f0; font-size: 0.875rem; }
    .mi-g018-ier td { background: #f4f8fc; font-weight: 700; color: var(--c3-primary); }
    .mi-g018-tinid { padding-left: 28px !important; font-family: monospace; }
    .mi-role-editor { display: inline-flex; align-items: center; gap: 6px; }
    .mi-pace-select { padding: 3px 6px; font-size: 0.75rem; }
    .mi-pace-select:disabled { opacity: 0.4; }

    /* CIS matice */
    .mi-cis-wrap { overflow-x: auto; }
    .mi-cis { width: 100%; border-collapse: collapse; border: 1px solid var(--c3-divider); }
    .mi-cis th {
      background: #e0e0e0; color: #333; font-size: 0.8125rem; font-weight: 700;
      padding: 8px 10px; border: 1px solid var(--c3-divider); white-space: nowrap;
    }
    .mi-cis td { padding: 6px 10px; border: 1px solid #eee; font-size: 0.875rem; }

    /* Graf mise */
    .mi-graph-controls { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; flex-wrap: wrap; }
    .mi-graph-canvas {
      position: relative; height: 400px;
      background: #fafbfc;
      background-image: radial-gradient(circle, #e3e8ec 1px, transparent 1px);
      background-size: 22px 22px;
      border: 1px solid var(--c3-divider); border-radius: var(--c3-radius-sm);
      overflow: hidden;
    }
    .mi-graph-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .mi-graph-edge { stroke: #9bb4cc; stroke-width: 2; }
    .mi-graph-edge-label { fill: var(--c3-text-muted); font-size: 11px; font-weight: 700; }
    .mi-graph-node {
      position: absolute; transform: translate(-50%, -50%);
      padding: 8px 12px; border-radius: var(--c3-radius-md);
      font-size: 0.8125rem; font-weight: 700; color: #fff;
      cursor: grab; user-select: none; white-space: nowrap;
      box-shadow: var(--c3-shadow-3); border: 2px solid rgba(255,255,255,0.6);
    }
    .mi-graph-node:active { cursor: grabbing; }
    .mi-graph-node--cp  { background: var(--c3-primary); }
    .mi-graph-node--hub { background: var(--c3-card-violet); }
    .mi-graph-node--ier { background: var(--c3-card-teal); }
    .mi-graph-node--tin { background: var(--c3-card-orange); }
    .mi-graph-node--ip  { background: var(--c3-card-cyan); }
    .mi-graph-node--jf  { background: var(--c3-card-slate-gray); }
