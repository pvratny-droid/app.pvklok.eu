    /* ===== Lokální styly prototypu RQU001 (odchylka jedné RQU dle _design/README.md) ===== */

    /* --- Značka prvků doplněných nad rámec analýzy --- */
    .dsz-mark { position: relative; outline: 1.5px dashed var(--dsz-warning); outline-offset: 2px; border-radius: 3px; }
    .dsz-mark-chip {
      position: absolute; top: -9px; right: 6px; z-index: 6;
      display: inline-flex; align-items: center; gap: 3px;
      height: 16px; padding: 0 6px;
      color: #fff; background: var(--dsz-warning);
      border-radius: var(--dsz-radius-pill);
      font-size: 9px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
      white-space: nowrap; cursor: help; user-select: none;
    }
    .dsz-mark-chip i { font-size: 9px; }
    .dsz-mark--block { display: block; }
    body.dsz-marks-off .dsz-mark { outline: none; }
    body.dsz-marks-off .dsz-mark-chip { display: none; }
    /* statická (ne-absolutní) varianta čipu – pro legendu */
    .dsz-chip-static {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 1px 7px; vertical-align: middle;
      color: #fff; background: var(--dsz-warning);
      border-radius: var(--dsz-radius-pill);
      font-size: 9.5px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
    }
    .dsz-chip-static i { font-size: 9px; }

    /* --- Demo lišta prototypu (scaffolding – není součástí cílové aplikace) --- */
    .dsz-demobar {
      position: sticky; top: var(--dsz-topbar-h); z-index: 38;
      display: flex; flex-wrap: wrap; align-items: center; gap: var(--dsz-space-3);
      padding: 8px var(--dsz-space-6);
      background: #2b2f33; color: #e9ecef;
      border-bottom: 2px solid var(--dsz-primary);
      font-size: 12px;
    }
    .dsz-demobar-tag {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 2px 9px; border-radius: var(--dsz-radius-pill);
      background: var(--dsz-primary); color: #fff;
      font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    }
    .dsz-demobar label { color: #c2c7cc; font-size: 11px; }
    .dsz-demobar select {
      background: #3a3f44; color: #fff; border: 1px solid #555b61;
      border-radius: var(--dsz-radius); padding: 4px 8px; font: inherit; font-size: 12px;
    }
    .dsz-demobar .dsz-demobar-spacer { flex: 1; }
    .dsz-demobar-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: var(--dsz-radius);
      background: #3a3f44; color: #fff; border: 1px solid #555b61;
      cursor: pointer; font: inherit; font-size: 12px;
    }
    .dsz-demobar-btn:hover { background: #474d53; }
    .dsz-demobar-btn.is-on { background: var(--dsz-warning); border-color: var(--dsz-warning); color: #fff; }
    .dsz-switch { display: inline-flex; align-items: center; gap: 6px; }
    .dsz-bell { position: relative; }
    .dsz-bell-count {
      position: absolute; top: -6px; right: -7px;
      min-width: 16px; height: 16px; padding: 0 4px;
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--dsz-primary); color: #fff;
      border-radius: var(--dsz-radius-pill); font-size: 9.5px; font-weight: 700;
    }

    /* --- Notifikační / role popup --- */
    .dsz-popwrap { position: relative; }
    .dsz-pop {
      position: absolute; right: 0; top: calc(100% + 8px); z-index: 60;
      width: 360px; max-height: 420px; overflow-y: auto;
      background: #fff; color: var(--dsz-text);
      border: 1px solid var(--dsz-border); border-radius: var(--dsz-radius-lg);
      box-shadow: var(--dsz-shadow-pop);
    }
    .dsz-pop-head {
      padding: 10px 14px; font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .05em; color: var(--dsz-text-muted);
      border-bottom: 1px solid var(--dsz-border); background: var(--dsz-bg-soft);
    }
    .dsz-pop-item {
      display: flex; gap: 10px; padding: 10px 14px;
      border-bottom: 1px solid var(--dsz-border); font-size: 13px;
    }
    .dsz-pop-item:last-child { border-bottom: none; }
    .dsz-pop-item.is-unread { background: var(--dsz-primary-tint); }
    .dsz-pop-item i { color: var(--dsz-primary); margin-top: 2px; }
    .dsz-pop-item time { display: block; font-size: 11px; color: var(--dsz-text-muted); margin-top: 3px; }
    .dsz-pop-item small { color: var(--dsz-text-muted); }

    /* --- Pomocné rozvržení --- */
    .dsz-stack { display: flex; flex-direction: column; gap: var(--dsz-space-4); }
    .dsz-grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: var(--dsz-space-4); align-items: start; }
    @media (max-width: 980px) { .dsz-grid-2 { grid-template-columns: 1fr; } }
    .dsz-toolbar-spacer { flex: 1; }
    .dsz-legend-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px 24px; }
    @media (max-width: 760px) { .dsz-legend-grid { grid-template-columns: 1fr; } }
    .dsz-legend-item { display: flex; gap: 9px; font-size: 13px; }
    .dsz-legend-item i { color: var(--dsz-warning); margin-top: 2px; }
    .dsz-legend-item b { display: block; }
    .dsz-legend-item span { color: var(--dsz-text-muted); font-size: 12px; }

    /* --- Komunikační vlákno (G0013) --- */
    .dsz-thread { display: flex; flex-direction: column; gap: var(--dsz-space-3); }
    .dsz-msg {
      border: 1px solid var(--dsz-border); border-radius: var(--dsz-radius);
      background: #fff; overflow: hidden;
    }
    .dsz-msg-head {
      display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
      padding: 7px 12px; background: var(--dsz-bg-soft);
      border-bottom: 1px solid var(--dsz-border); font-size: 12px;
    }
    .dsz-msg-head strong { font-size: 13px; }
    .dsz-msg-head time { color: var(--dsz-text-muted); margin-left: auto; }
    .dsz-msg-body { padding: 9px 12px; font-size: 13px; white-space: pre-wrap; }
    .dsz-msg--retired { opacity: .72; }
    .dsz-msg--retired .dsz-msg-head { background: #f1f0ee; }
    .dsz-msg--vyjadreni { border-left: 3px solid var(--dsz-warning); }
    .dsz-msg--pokyn { border-left: 3px solid var(--dsz-primary); }

    /* --- Souhrn / read-only údaje --- */
    .dsz-changed {
      background: var(--dsz-warning-tint);
      box-shadow: inset 3px 0 0 var(--dsz-warning);
      padding-left: 6px; border-radius: 2px;
    }
    .dsz-typecard {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 12px 14px; border: 1px solid var(--dsz-border);
      border-radius: var(--dsz-radius); cursor: pointer; background: #fff;
      transition: all var(--dsz-transition);
    }
    .dsz-typecard:hover { border-color: var(--dsz-primary); background: var(--dsz-primary-tint); }
    .dsz-typecard.is-sel { border-color: var(--dsz-primary); background: var(--dsz-primary-tint-2); box-shadow: var(--dsz-focus-ring); }
    .dsz-typecard input { margin-top: 3px; accent-color: var(--dsz-primary); }
    .dsz-typecard b { font-size: 14px; }
    .dsz-typecard span { font-size: 12px; color: var(--dsz-text-muted); }
    .dsz-typegrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 620px) { .dsz-typegrid { grid-template-columns: 1fr; } }

    .dsz-filebox {
      display: flex; align-items: center; gap: 10px;
      padding: 16px; border: 1.5px dashed var(--dsz-border-strong);
      border-radius: var(--dsz-radius); color: var(--dsz-text-muted);
      background: var(--dsz-bg-soft); font-size: 13px;
    }
    .dsz-filelist { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
    .dsz-filelist-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; border: 1px solid var(--dsz-border);
      border-radius: var(--dsz-radius); font-size: 13px;
    }
    .dsz-filelist-item i.fa-file-lines { color: var(--dsz-primary); }
    .dsz-filelist-item .dsz-toolbar-spacer { flex: 1; }
    .dsz-pill-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .dsz-audit { width: 100%; }
    .dsz-empty-illus { font-size: 30px; color: var(--dsz-border-strong); margin-bottom: 8px; }
    .inw-page-header-crumbs .inw-crumb { cursor: default; }

  <script>
  /* =====================================================================
     DSZEZ – funkční prototyp k analýze RQU001 (Digitální schvalování zkoušek EZ)
     ---------------------------------------------------------------------
     Jeden soubor, vanilla JS, hash-routing, in-memory stavová simulace.
     Renderuje přes sdílený objekt DSZEZ (../_design/). Barvy jen --dsz-*.

     ZNAČENÍ: vše, co NENÍ v analýze a je doplněno (z úvahy nebo ze zdrojových
     dokumentů projektu), je obaleno tříd­ou .dsz-mark se štítkem „doplněno"
     a tooltipem [ZDROJ]/[ÚVAHA] + číslem otevřené otázky z README.md.
     ===================================================================== */
  (function () {
    'use strict';
    var D = window.DSZEZ;
    var esc = D.escapeHtml;

    /* ================================================================
       1. ZNAČENÍ DOPLNĚNÝCH PRVKŮ
       ================================================================ */
    /* mark(html, note)  – obalí inline/blokový fragment značkou doplnění.
       note začíná [ZDROJ] / [ÚVAHA] a uvádí důvod + otevřenou otázku. */
    function mark(html, note) {
      return '<span class="dsz-mark" title="' + esc(note) + '">' + html +
        '<span class="dsz-mark-chip"><i class="fa-solid fa-flask"></i>doplněno</span></span>';
    }
    /* markBlock(html, note) – bloková varianta (obalí <div>, např. celé karty) */
    function markBlock(html, note) {
      return '<div class="dsz-mark dsz-mark--block" title="' + esc(note) + '">' + html +
        '<span class="dsz-mark-chip"><i class="fa-solid fa-flask"></i>doplněno</span></div>';
    }
    var chip = '<span class="dsz-mark-chip"><i class="fa-solid fa-flask"></i>doplněno</span>';
    var chipStatic = '<span class="dsz-chip-static"><i class="fa-solid fa-flask"></i>doplněno</span>';

    /* ================================================================
       2. ČÍSELNÍKY  (analýza 04_logicky_model.md, E0001–E0006)
       ================================================================ */
    var TYP_ZKOUSKY = {
      PROVOZNI:      { label: 'Provozní zkouška',      desc: 'Zkouška zařízení v běžném provozu PS.' },
      CERTIFIKACNI:  { label: 'Certifikační zkouška',  desc: 'Certifikace zdroje / SVR pro poskytování podpůrných služeb.' },
      RIZIKOVA:      { label: 'Riziková zkouška',      desc: 'Zkouška se zvýšeným rizikem pro provoz PS (dle PP/86).' },
      PREDKOMPLEXNI: { label: 'Předkomplexní zkouška', desc: 'Zkouška před komplexním vyzkoušením nového zařízení.' },
      KOMPLEXNI:     { label: 'Komplexní zkouška',     desc: 'Komplexní vyzkoušení nově budovaného / rekonstruovaného zařízení.' },
      PERIODICKA:    { label: 'Periodická zkouška',    desc: 'Pravidelně opakovaná zkouška dle Kodexu PS.' }
    };
    /* skupina „náročnějšího" workflow (analýza FR0001 přírůstek IT2) */
    var TYP_NAROCNE = { RIZIKOVA: 1, PREDKOMPLEXNI: 1, KOMPLEXNI: 1 };

    var STAV_ZADOSTI = {
      ROZPRACOVANA:      { label: 'Rozpracovaná',       badge: 'muted'  },
      VE_SCHVALOVANI:    { label: 'Ve schvalování',     badge: 'info'   },
      SCHVALENA:         { label: 'Schválená',          badge: 'ok'     },
      ZAMITNUTA:         { label: 'Zamítnutá',          badge: 'error'  },
      ZKOUSKA_PROVEDENA: { label: 'Zkouška provedena',  badge: 'info'   },
      VYHODNOCENA:       { label: 'Vyhodnocená',        badge: 'ok'     },
      ARCHIVOVANA:       { label: 'Archivovaná',        badge: 'muted'  }
    };
    var CITLIVOST = { VEREJNE: 'Veřejné', INTERNI: 'Interní', CITLIVE_INTERNI: 'Citlivé interní' };
    /* Číselník zkoušených zařízení EZ (G0004 atr. 4 – ELOV). V cílovém řešení je
       obsah synchronizován z AŘP (NREQ_012); zde ukázková sada. Správa obsahu
       číselníku patří do administrace, která není předmětem prototypu. */
    var ZARIZENI_EZ = [
      'TR T401 – transformátor 110/22 kV, R Krasíkov',
      'TR T402 – transformátor 110/22 kV, R Krasíkov',
      'TR T108 – transformátor 110/22 kV, R Západ',
      'TR T201 – transformátor 110/22 kV, R Sever',
      'TR T210 – transformátor 110/22 kV, R Jih',
      'TR T305 – transformátor 110/35 kV, R Východ',
      'Blok B3 – výrobní jednotka 110 MW, Elektrárna Počerady',
      'Vedení V411 – separátní trasa Hradec – Řeporyje',
      'Nová rozvodna R110 kV Mírovka – kompletní vyzkoušení',
      'Rozvodna R420 kV Babylon – předkomplexní zkoušky pole V05'
    ];
    /* posouzení → stav pro .inw-status / .inw-timeline */
    var VYSL_STATUS = { CEKA: 'progress', SCHVALENO: 'approved', ZAMITNUTO: 'rejected', WAITING: 'waiting' };

    /* ================================================================
       3. ORGANIZAČNÍ ÚTVARY ČEPS  (zdroj: Identifikace účastníků workflow.xlsx)
       ================================================================ */
    var UTVARY = {
      '13232': { nazev: '13232 Vyhodnocení SyS',                osoba: 'S. Kacířová', popis: 'Vstupní administrace a koordinace žádostí (v TO-BE automatizováno).' },
      '14630': { nazev: '14630 Příprava provozu',               osoba: 'P. Abert',    popis: 'Kontrola a podpis schvalovacího listu, manipulace v rozvodnách.' },
      '18230': { nazev: '18230 Tech. koncepce zařízení rozvoden', osoba: 'K. Čerňanová', popis: 'Posouzení a schválení certifikace zdrojů.' },
      '18212': { nazev: '18212 Analýzy PS',                     osoba: 'T. Hába',     popis: 'Posouzení dopadů zkoušky do přenosové soustavy.' },
      '18232': { nazev: '18232 Sekundární technika',            osoba: 'T. Hába',     popis: 'Posouzení zařízení ochran – jen při manipulacích v rozvodnách.' },
      '13350': { nazev: '13350 Zabezpečení provozu PS',         osoba: 'M. Suchý',    popis: 'Kontrola úplnosti, projednání na gremiální poradě.' },
      '13310': { nazev: '13310 Hlavní dispečer',               osoba: 'L. Novák',    popis: 'Podpis vedoucího zkoušek u rizikových zkoušek.' }
    };

    /* ================================================================
       4. PRAVIDLA URČENÍ SCHVALOVATELŮ  (analýza L0010 – konkrétní sada
          není v zadání; DOPLNĚNO ze zdrojů + úvahy, otevřené otázky #1,#2)
       ================================================================ */
    var PRAVIDLA = [
      { id: 'PR-01', typ: '*',                                 podm: 'vzdy',        utvar: '14630', ucel: 'Kontrola součinnosti provozu, podpis schvalovacího listu.', lhuta: 14 },
      { id: 'PR-02', typ: '*',                                 podm: 'manipulace',  utvar: '18232', ucel: 'Posouzení zařízení ochran při manipulacích v rozvodnách.',  lhuta: 7  },
      { id: 'PR-03', typ: 'CERTIFIKACNI',                       podm: 'vzdy',        utvar: '18230', ucel: 'Posouzení a schválení požadované certifikace zdroje (SVR).', lhuta: 10 },
      { id: 'PR-04', typ: 'CERTIFIKACNI',                       podm: 'vzdy',        utvar: '18212', ucel: 'Posouzení dopadů certifikační zkoušky do PS.',              lhuta: 10 },
      { id: 'PR-05', typ: 'RIZIKOVA|PREDKOMPLEXNI|KOMPLEXNI',   podm: 'vzdy',        utvar: '13310', ucel: 'Podpis vedoucího zkoušek (riziková skupina dle PP/86).',    lhuta: 10 },
      { id: 'PR-06', typ: 'RIZIKOVA|PREDKOMPLEXNI|KOMPLEXNI',   podm: 'vzdy',        utvar: '13350', ucel: 'Kontrola úplnosti a projednání na gremiální poradě.',       lhuta: 14, gremialka: true },
      { id: 'PR-07', typ: 'RIZIKOVA|PREDKOMPLEXNI|KOMPLEXNI',   podm: 'vzdy',        utvar: '18212', ucel: 'Posouzení dopadů náročné zkoušky do PS.',                  lhuta: 10 }
    ];
    /* Vyhodnotí pravidla a vrátí seznam útvarů (kódů) schvalovatelů pro žádost. */
    function urciSchvalovatele(typ, manipulace) {
      var out = [];
      PRAVIDLA.forEach(function (p) {
        if (p.typ !== '*' && p.typ.split('|').indexOf(typ) < 0) return;
        if (p.podm === 'manipulace' && !manipulace) return;
        if (out.indexOf(p.utvar) < 0) out.push(p.utvar);
      });
      return out;
    }
    function pravidloLhuta(typ, utvar) {
      for (var i = 0; i < PRAVIDLA.length; i++) {
        var p = PRAVIDLA[i];
        if (p.utvar !== utvar) continue;
        if (p.typ === '*' || p.typ.split('|').indexOf(typ) >= 0) return p.lhuta;
      }
      return 10;
    }

    /* ================================================================
       5. IDENTITY pro přepínač role  (analýza neřeší uživatelské účty –
          otevřená otázka #9; přepínač = scaffolding prototypu)
       ================================================================ */
    var IDENTITY = {
      ZADATEL:   { name: 'Ing. Pavel Dvořák',    role: 'Žadatel · ČEZ Distribuce, a.s.',                kind: 'ZADATEL' },
      ABERT:     { name: 'Petr Abert',           role: 'Schvalovatel · 14630 Příprava provozu',         kind: 'SCHVALOVATEL', utvar: '14630' },
      CERNANOVA: { name: 'Katarína Čerňanová',   role: 'Schvalovatel · 18230 Tech. koncepce zař. rozvoden', kind: 'SCHVALOVATEL', utvar: '18230' },
      HABA:      { name: 'Tomáš Hába',           role: 'Podpůrný útvar · 18232 Sekundární technika',    kind: 'PODPURNY',     utvar: '18232' },
      KACIROVA:  { name: 'Simona Kacířová',      role: 'Správce workflow · 13232 Vyhodnocení SyS',      kind: 'SPRAVCE',      utvar: '13232' }
    };

    /* ================================================================
       6. SEED DATA – žádosti o zkoušku  (analýza L0001–L0007; ilustrační
          obsah prototypu – pokrývá všechny stavy stavZadosti_E)
       ================================================================ */
    function P(utvar, vysledek, ext) {            /* posouzení schvalovatele */
      var o = { utvar: utvar, vysledek: vysledek || 'CEKA', oduvodneni: '',
                dodatecnePodminky: '', lhuta: '', datumRozhodnuti: '',
                gremialka: false, delegace: [] };
      if (ext) for (var k in ext) o[k] = ext[k];
      return o;
    }
    var SEQ = { zadost: 42, deleg: 20, kom: 80 };

    var ZADOSTI = [
      /* 1 — Provozní, čerstvě podaná, čeká na 14630 (Abert) */
      { id: 'z42', cislo: 'ZD-2026-0042', nazev: '', typ: 'PROVOZNI', stav: 'VE_SCHVALOVANI',
        zadatel: { nazev: 'ČEZ Distribuce, a.s.', kontakt: 'Ing. Pavel Dvořák', email: 'dvorak@cezdistribuce.cz', interni: false },
        zarizeni: 'TR T401 – transformátor 110/22 kV, R Krasíkov', lokalita: 'Rozvodna Krasíkov (KRA)',
        terminOd: '2026-06-15T08:00', terminDo: '2026-06-15T16:00',
        program: '08:00 zahájení, kontrola zapojení\n09:00–14:00 měření naprázdno a nakrátko\n14:00–16:00 vyhodnocení, ukončení',
        vyzadujeSoucinnost: true, popisSoucinnosti: 'Požadováno odpojení transformátoru T401 ze strany 110 kV dispečerem ČEPS po dobu zkoušky.',
        vyzadujeManipulace: false, citlivost: 'INTERNI', souhlas: true, datumPodani: '2026-05-20T09:14',
        poleTyp: { druhProvozni: 'Měření charakteristik transformátoru' }, prilohy: [{ nazev: 'Program_zkousky_T401.pdf', velikost: 240000 }],
        zmeneno: [],
        beh: { poradi: 1, posouzeni: [ P('14630', 'CEKA', { lhuta: '2026-06-01' }) ],
          komentare: [],
          audit: [ { cas: '2026-05-20T09:14', ucastnik: 'Žadatel', udalost: 'Žádost podána', vysledek: '' },
                   { cas: '2026-05-20T09:14', ucastnik: 'Aplikace', udalost: 'Určen okruh schvalovatelů (14630), spuštěno workflow', vysledek: '' },
                   { cas: '2026-05-20T09:14', ucastnik: 'Aplikace', udalost: 'Notifikace odeslána útvaru 14630', vysledek: '' } ] },

      { id: 'n2', proRole: ['ABERT'],   ikona: 'workflow', text: 'Nová žádost ZD-2026-0036 k posouzení (riziková zkouška).', cas: '2026-05-19T15:05', unread: true },
      { id: 'n3', proRole: ['HABA'],    ikona: 'delegate', text: 'Delegace k vyjádření u žádosti ZD-2026-0039 (lhůta 26.05.2026).', cas: '2026-05-18T08:40', unread: true },
      { id: 'n4', proRole: ['CERNANOVA'], ikona: 'comment', text: 'Žádost ZD-2026-0039 – nový komentář ve schvalovacím vlákně.', cas: '2026-05-18T08:40', unread: false },
      { id: 'n5', proRole: ['ZADATEL'], ikona: 'reject',   text: 'Žádost ZD-2026-0028 byla zamítnuta útvarem 14630.', cas: '2026-05-13T10:30', unread: false },
      { id: 'n6', proRole: ['ZADATEL'], ikona: 'approve',  text: 'Žádost ZD-2026-0030 byla schválena všemi schvalovateli.', cas: '2026-05-12T16:00', unread: false }

    /* ================================================================
       7. STAV APLIKACE + POMOCNÉ FUNKCE
       ================================================================ */
    var State = { identity: 'ZADATEL', route: '#/portal', marks: true, pop: null,
                  form: null, formMode: null, formErrors: {}, formZ: null,
                  vyhEdit: null, vyhReakce: false, vyhText: '', vyhPodklady: [], zastup: null };

    function cu() { return IDENTITY[State.identity]; }
    function findZ(id) { for (var i = 0; i < ZADOSTI.length; i++) if (ZADOSTI[i].id === id) return ZADOSTI[i]; return null; }
    function ic(name) { return D.iconHTML(name); }
    function fmtD(v) { return v ? D.formatDate(v) : '—'; }
    function fmtDT(v) { return v ? D.formatDateTime(v) : '—'; }
    function utvarNazev(c) { return UTVARY[c] ? UTVARY[c].nazev : c; }
    function utvarOsoba(c) { return UTVARY[c] ? UTVARY[c].osoba : ''; }
    function typLabel(t) { return TYP_ZKOUSKY[t] ? TYP_ZKOUSKY[t].label : t; }
    function stavInfo(s) { return STAV_ZADOSTI[s] || { label: s, badge: 'muted' }; }
    function stavChip(s) { var i = stavInfo(s); return D.renderBadge({ label: i.label, variant: i.badge }); }
    function unreadCount() {
      var n = 0; NOTIFIKACE.forEach(function (x) { if (x.unread && x.proRole.indexOf(State.identity) >= 0) n++; }); return n;
    }
    function nl2br(s) { return D.nl2br(s || ''); }

    /* posouzení daného útvaru v aktivním běhu */
    function posouzeniUtvaru(z, utvar) {
      var ps = z.beh.posouzeni;
      for (var i = 0; i < ps.length; i++) if (ps[i].utvar === utvar) return ps[i];
      return null;
    }
    /* otevřená delegace na daný útvar (napříč posouzeními) */
    function delegaceProUtvar(z, utvar) {
      var out = [];
      z.beh.posouzeni.forEach(function (p) {
        p.delegace.forEach(function (d) { if (d.utvar === utvar) out.push({ p: p, d: d }); });
      });
      return out;
    }
    /* mapování posouzení → stav workflow chipu */
    function posStatus(p) {
      if (p.vysledek === 'SCHVALENO') return 'approved';
      if (p.vysledek === 'ZAMITNUTO') return 'rejected';
      for (var i = 0; i < p.delegace.length; i++) if (p.delegace[i].stav === 'CEKA') return 'waiting';
      return 'progress';
    }
    /* lhůta po termínu? */
    function poLhute(d) { return d && new Date(d) < new Date('2026-05-22'); }

    /* úkoly aktuálního uživatele (schvalovatel/podpůrný) */
    function mojeUkoly() {
      var u = cu(), out = [];
      if (!u.utvar) return out;
      ZADOSTI.forEach(function (z) {
        if (z.stav !== 'VE_SCHVALOVANI') return;
        var role = null;
        var p = posouzeniUtvaru(z, u.utvar);
        if (p && p.vysledek === 'CEKA') role = 'Schvalovatel';
        var dl = delegaceProUtvar(z, u.utvar);
        var openDl = dl.filter(function (x) { return x.d.stav === 'CEKA'; });
        if (openDl.length) role = role ? role + ' + Podpůrný útvar' : 'Podpůrný útvar';
        if (role) out.push({ z: z, role: role });
      });
      return out;
    }

    /* ---- skladba polí formuláře podle typu zkoušky -----------------
       Analýza modeluje jen oblasti G0004–G0008 obecně; pole specifická
       pro typ zkoušky DOPLNĚNA (ot. #14, #3 – šablony formulářů „teprve
       vzniknou"). Opora: Kodex PS část VI, Pracovní postup PP/86. */
    var MARK_POLE = '[ÚVAHA] Pole specifické pro tento typ zkoušky. Skladbu polí formulářů dle typu zkoušky analýza nestanovuje (šablony „teprve vzniknou" – ot. #14). Návrh dle Kodexu PS část VI a PP/86.';
    var MARK_NAROCNE = '[ZDROJ] Pole pro rizikovou skupinu zkoušek. Opora: Pracovní postup PP/86 příloha č. 3 (program zablokování ochran), BA dokument kap. 4.3. Skladba polí formuláře dle typu není v analýze (ot. #14).';

    function poleTypu(typ) {
      if (typ === 'PROVOZNI' || typ === 'PERIODICKA')
        return [{ name: 'druhProvozni', label: 'Druh zkoušky', type: 'text',
                  hint: 'Např. měření charakteristik, revize, kontrola.', mark: MARK_POLE }];
      if (typ === 'CERTIFIKACNI')
        return [
          { name: 'typZdroje', label: 'Typ zdroje', type: 'select', required: true, mark: MARK_POLE,
            options: ['Klasická parní elektrárna', 'Plynová / paroplynová elektrárna', 'Vodní elektrárna', 'Fotovoltaická elektrárna', 'Větrná elektrárna', 'Akumulační zařízení (BESS)'] },
          { name: 'vyrobniJednotka', label: 'Výrobní jednotka / blok', type: 'text', required: true, mark: MARK_POLE },
          { name: 'pozadovanaCertifikace', label: 'Požadovaná certifikace (PpS)', type: 'text', required: true,
            hint: 'Např. SVR – sekundární regulace U/Q, f/P.', mark: MARK_POLE } ];
      /* riziková / předkomplexní / komplexní */
      return [
        { name: 'vedouciZkousky', label: 'Vedoucí zkoušky', type: 'text', required: true, mark: MARK_NAROCNE },
        { name: 'koordinator', label: 'Koordinátor zkoušky', type: 'text', mark: MARK_NAROCNE },
        { name: 'dotceneOchrany', label: 'Dotčené ochrany / separátní trasa', type: 'text', required: true, mark: MARK_NAROCNE },
        { name: 'programZablokovani', label: 'Program zablokování funkce ochran', type: 'textarea', required: true,
          hint: 'Dle PP/86 přílohy č. 3 – Schvalovací postup rizikových zkoušek.', mark: MARK_NAROCNE } ];
    }

    /* ================================================================
       8. ROUTOVÁNÍ
       ================================================================ */
    function route() {
      State.route = location.hash || '#/portal';
      State.pop = null;
      render();
    }
    function go(hash) { location.hash = hash; }
    function routeParts() { return State.route.replace(/^#\//, '').split('/'); }

    /* ================================================================
       9. SPOLEČNÉ RENDER HELPERY
       ================================================================ */
    /* Formulářové pole (vlastní renderer kvůli značení + readonly). */
    function field(o) {
      var cls = 'inw-field' + (o.full ? ' inw-field-full' : '') +
                (o.invalid ? ' inw-field--invalid' : '') + (o.mark ? ' dsz-mark' : '');
      var v = o.value == null ? '' : o.value, dis = o.readonly ? ' disabled' : '', ctrl;
      if (o.type === 'select') {
        var ovals = (o.options || []).map(function (op) { return typeof op === 'string' ? op : op.value; });
        /* tolerance: hodnota mimo číselník (legacy) se přidá jako vybraná položka */
        var extra = (v && ovals.indexOf(v) < 0)
          ? '<option value="' + esc(v) + '" selected>' + esc(v) + '</option>' : '';
        ctrl = '<select data-fld="' + o.name + '"' + dis + '><option value="">— vyberte —</option>' + extra +
          (o.options || []).map(function (op) {
            var val = typeof op === 'string' ? op : op.value, lab = typeof op === 'string' ? op : op.label;
            return '<option value="' + esc(val) + '"' + (val === v ? ' selected' : '') + '>' + esc(lab) + '</option>';
          }).join('') + '</select>';
      } else if (o.type === 'textarea') {
        ctrl = '<textarea data-fld="' + o.name + '"' + dis +
          (o.rows ? ' style="min-height:' + (o.rows * 22) + 'px"' : '') + '>' + esc(v) + '</textarea>';
      } else {
        ctrl = '<input type="' + (o.type || 'text') + '" data-fld="' + o.name + '" value="' + esc(v) + '"' + dis + '>';
      }
      return '<div class="' + cls + '"' + (o.mark ? ' title="' + esc(o.mark) + '"' : '') + '>' +
        (o.mark ? chip : '') +
        '<label>' + esc(o.label) + (o.required ? ' <span class="inw-req">povinné</span>' : '') + '</label>' +
        ctrl +
        (o.invalid ? '<span class="inw-hint" style="color:var(--dsz-danger)">' + esc(o.invalid) + '</span>'
          : (o.hint ? '<span class="inw-hint">' + esc(o.hint) + '</span>' : '')) +
        '</div>';
    }
    /* Sečte hodnoty všech polí [data-fld] v aplikaci do objektu. */
    function readForm() {
      var o = {};
      D.$$('#app [data-fld]').forEach(function (el) {
        o[el.getAttribute('data-fld')] = el.type === 'checkbox' ? el.checked : el.value;
      });

    }

      var body = list.length ? list.map(function (x) {

    function render() {
      document.body.classList.toggle('dsz-marks-off', !State.marks);
      var parts = routeParts(), view;
      if (parts[0] === 'plocha') view = viewPlocha();
      else if (parts[0] === 'pravidla') view = viewPravidla();
      else if (parts[0] === 'zadost') view = viewZadost(parts[1]);
      else if (parts[0] === 'detail') view = viewDetail(parts[1]);
      else view = viewPortal();
      var app = document.getElementById('app');
      app.innerHTML = topbar() + demobar() + '<div class="inw-page">' + view + '</div>';
      D.bindAll(app);

    var fPortal = { q: '', stav: '' };

    function abtn(act, id, icon, title, variant) {
      return '<button class="inw-btn inw-btn--' + (variant || 'ghost') + ' inw-btn--sm" data-act="' +
        act + '" data-id="' + id + '" title="' + esc(title) + '">' + ic(icon) + '</button>';
    }
    /* krátký popis aktuálního kroku workflow */
    function krokWorkflow(z) {
      if (z.stav === 'ROZPRACOVANA') return 'Nepodáno – rozpracováno';
      if (z.stav === 'VE_SCHVALOVANI') {
        var ps = z.beh.posouzeni, done = 0;
        ps.forEach(function (p) { if (p.vysledek === 'SCHVALENO') done++; });
        return 'Posouzeno ' + done + ' z ' + ps.length + ' schvalovatelů';
      }
      if (z.stav === 'SCHVALENA') return 'Schváleno – čeká na provedení zkoušky';
      if (z.stav === 'ZAMITNUTA') return 'Zamítnuto – lze upravit a podat znovu';
      if (z.stav === 'ZKOUSKA_PROVEDENA')
        return z.vyhodnoceni ? 'Vyhodnocení v kontrole ČEPS' : 'Čeká na vytvoření vyhodnocení';
      if (z.stav === 'VYHODNOCENA') return 'Vyhodnocení přijato';
      if (z.stav === 'ARCHIVOVANA') return 'Objekt zkoušky archivován';
      return '';

        ['Kanál notifikací', 'Analýza nerozhoduje (e-mail / ticket / in-app – ot. #5). Prototyp používá in-app notifikace + indikaci e-mailu.'],

        ['Přepínač role / přihlášení', 'Uživatelské účty a autentizace nejsou řešeny (ot. #9). Přepínač nahrazuje přihlášení pro předvedení workflow.'],
        ['Trigger „zkouška provedena"', 'Mechanismus zjištění provedení zkoušky není v zadání (ot. #16). Doplněna ruční akce „Označit zkoušku jako provedenou".']

      return D.renderPageHeader({

      '<div class="dsz-stack">' + legendCard() +

    /* ================================================================

    function blankForm(typ) {
      return { typ: typ, nazev: '', zarizeni: '', lokalita: '',
        zadatelNazev: 'ČEZ Distribuce, a.s.', kontakt: cu().kind === 'ZADATEL' ? cu().name : '',

    function formFromZ(z) {
      var f = blankForm(z.typ);
      f.nazev = z.nazev; f.zarizeni = z.zarizeni; f.lokalita = z.lokalita;
      f.zadatelNazev = z.zadatel.nazev; f.kontakt = z.zadatel.kontakt; f.email = z.zadatel.email;
      f.terminOd = z.terminOd; f.terminDo = z.terminDo; f.program = z.program;
      f.vyzadujeSoucinnost = z.vyzadujeSoucinnost; f.popisSoucinnosti = z.popisSoucinnosti;
      f.vyzadujeManipulace = z.vyzadujeManipulace; f.citlivost = z.citlivost; f.souhlas = z.souhlas;
      f.prilohy = z.prilohy.slice();
      for (var k in z.poleTyp) f[k] = z.poleTyp[k];
      return f;
    }
    /* zajistí inicializaci State.form pro daný klíč routy */
    function ensureForm(id) {
      if (State.formKey === id && State.form) return true;
      if (id === 'nova') {
        if (!State.newTyp) return false;
        State.form = blankForm(State.newTyp); State.formMode = 'nova'; State.formZ = null;
      } else {
        var z = findZ(id);
        if (!z) return false;
        State.form = formFromZ(z);
        State.formMode = z.stav === 'ROZPRACOVANA' ? 'draft' : 'edit';
        State.formZ = z;
      }
      State.formKey = id; State.formErrors = {};
      return true;
    }

    function checkField(name, label, checked, hint, mk) {
      return '<div class="inw-field inw-field-full' + (mk ? ' dsz-mark' : '') + '"' +
        (mk ? ' title="' + esc(mk) + '"' : '') + '>' + (mk ? chip : '') +
        '<label class="inw-checkbox"><input type="checkbox" data-fld="' + name + '"' +
        (checked ? ' checked' : '') + '> ' + esc(label) + '</label>' +
        (hint ? '<span class="inw-hint">' + esc(hint) + '</span>' : '') + '</div>';
    }

    function viewZadost(id) {
      if (!ensureForm(id)) { go('#/portal'); return ''; }
      var f = State.form, e = State.formErrors, mode = State.formMode, z = State.formZ;
      var nadpis = mode === 'edit' ? 'Úprava žádosti ' + (z.cislo || '')
        : (mode === 'draft' ? 'Rozpracovaná žádost o zkoušku' : 'Nová žádost o zkoušku');

      /* hlavičkové (read-only) údaje */
      var hlavicka = D.renderKv({ items: [
        { label: 'Typ zkoušky', value: typLabel(f.typ) },
        { label: 'Číslo žádosti', value: mode === 'edit' ? (z.cislo || '') : 'přidělí se po podání' },
        { label: 'Stav žádosti', value: mode === 'edit' ? stavInfo(z.stav).label : 'Rozpracovaná', html: false }
      ] });

      /* G0004 – základní údaje */
      var zaklad = '<div class="inw-form">' +
        field({ name: 'zadatelNazev', label: 'Žadatel (subjekt provádějící zkoušku)', value: f.zadatelNazev, required: true, invalid: e.zadatelNazev }) +
        field({ name: 'zarizeni', label: 'Zkoušené zařízení EZ', type: 'select', value: f.zarizeni,

        field({ name: 'kontakt', label: 'Kontaktní osoba', value: f.kontakt, required: true, invalid: e.kontakt }) +
        field({ name: 'email', label: 'Kontaktní e-mail', type: 'email', value: f.email, required: true, invalid: e.email }) +
        field({ name: 'lokalita', label: 'Lokalita / rozvodna', value: f.lokalita }) +
        field({ name: 'citlivost', label: 'Citlivost dat', type: 'select', value: f.citlivost,
                options: [{ value: 'VEREJNE', label: 'Veřejné' }, { value: 'INTERNI', label: 'Interní' },
                          { value: 'CITLIVE_INTERNI', label: 'Citlivé interní' }] }) +
        '</div>';

      /* specifická pole dle typu (doplněno – značeno) */
      var spec = poleTypu(f.typ).map(function (o) {

      /* G0005 – termín a program */

        field({ name: 'terminDo', label: 'Termín zkoušky – do', type: 'datetime-local', value: f.terminDo, required: true, invalid: e.terminDo }) +
        field({ name: 'program', label: 'Program zkoušky', type: 'textarea', rows: 5, value: f.program, required: true, full: true,
                invalid: e.program, hint: 'Podrobný přehled činností a manipulací s časovým určením kroků (dle Kodexu PS).' }) +
        '</div>';

      /* G0006 – součinnost ČEPS */
      var soucinnost = '<div class="inw-form">' +
        checkField('vyzadujeSoucinnost', 'Zkouška vyžaduje součinnost ČEPS', f.vyzadujeSoucinnost,
          'Řídí rozsah schvalovacího workflow.') +
        field({ name: 'popisSoucinnosti', label: 'Popis požadované součinnosti ČEPS', type: 'textarea', rows: 4,
          value: f.popisSoucinnosti, full: true, invalid: e.popisSoucinnosti,

        checkField('vyzadujeManipulace', 'Zkouška vyžaduje manipulace v rozvodnách', f.vyzadujeManipulace,
          'Vstupuje do automatického určení schvalovatelů (zapojení útvaru ochran).') +
        '</div>';

      /* G0007 – přílohy */
      var fileList = f.prilohy.length ? '<div class="dsz-filelist">' + f.prilohy.map(function (p, i) {
        return '<div class="dsz-filelist-item">' + ic('file') + '<span>' + esc(p.nazev) + '</span>' +

          '<button class="inw-btn inw-btn--ghost inw-btn--sm" data-act="rm-priloha" data-idx="' + i + '" title="Odebrat">' + ic('delete') + '</button>' +

      var prilohy = '<div class="dsz-filebox">' + ic('upload') +
        '<span>Přetáhněte soubory sem nebo je nahrajte tlačítkem. U vybraných typů zkoušek mohou být přílohy povinné.</span></div>' +
        '<div style="margin-top:10px">' + D.button({ label: 'Nahrát přílohu', variant: 'secondary', icon: 'attach', attrs: ' data-act="add-priloha"' }) + '</div>' +
        fileList;

      /* G0008 – souhlas */
      var podminky = 'Podáním žádosti potvrzuji, že nesu odpovědnost za správnost a úplnost ' +
        'všech uvedených informací a za úplný popis součinnosti požadované od ČEPS. Beru na vědomí, ' +
        'že formulář žádosti je vůči ČEPS primárním zdrojem pravdy a přílohy jsou pouze podpůrným podkladem.';
      var souhlas = '<div class="inw-section" style="border-color:var(--dsz-border)">' +

        (e.souhlas ? '<div class="inw-error" style="margin-top:6px">' + esc(e.souhlas) + '</div>' : '') +
        '</div>';

      /* upozornění u úpravy (analýza UC0008) */
      var editWarn = mode === 'edit'

          'schvalování a spuštěno nové workflow.</div><div style="height:12px"></div>'
        : '';

      /* patička s akcemi */

          ' ' + D.button({ label: 'Zahodit změny', variant: 'secondary', attrs: ' data-act="discard-form"' });
      else
        footer = D.button({ label: 'Podat žádost', variant: 'primary', icon: 'send', attrs: ' data-act="submit-zadost"' }) +
          ' ' + D.button({ label: 'Uložit rozpracované', variant: 'secondary', icon: 'save', attrs: ' data-act="save-draft"' }) +
          ' ' + D.button({ label: 'Zahodit', variant: 'ghost', attrs: ' data-act="discard-form"' });

      var card = function (t, sub, body) {
        return D.renderCard({ title: t, subtitle: sub, body: body, collapsible: true });
      };

      return D.renderPageHeader({
        title: nadpis,
        subtitle: 'Formulář žádosti o zkoušku EZ – skladba a povinnost polí se řídí typem zkoušky.',
        crumbs: [{ label: 'DSZEZ' }, { label: 'Portál žadatele' }, { label: nadpis, active: true }],
        actions: D.button({ label: 'Zpět na portál', variant: 'ghost', icon: 'back', attrs: ' data-act="nav-portal"' })
      }) +
      '<div class="dsz-stack">' + editWarn +
        D.renderCard({ title: 'Žádost o zkoušku EZ', subtitle: 'Hlavičkové údaje (G0003)', body: hlavicka }) +
        card('Základní údaje žádosti', 'Oblast G0004', zaklad) +
        (spec ? card('Údaje specifické pro typ zkoušky', 'Doplněno nad rámec analýzy — skladba polí dle typu',

    function viewPlocha() {
      var u = cu();
      var header = D.renderPageHeader({
        title: 'Pracovní plocha schvalovatele',

        actions: D.button({ label: 'Nastavit zastupitelnost', variant: 'secondary', icon: 'user', attrs: ' data-act="open-zastup"' })
      });

      if (!u.utvar) {
        return header + D.renderCard({ title: 'Žádosti ke schválení',
          body: '<div class="inw-state"><div class="dsz-empty-illus">' + ic('workflow') + '</div>' +
            'Přihlášená role <strong>' + esc(u.role) + '</strong> nevystupuje ve schvalovacím workflow ' +
            'jako schvalovatel. Pro vyzkoušení posuzování přepněte roli v horní liště ' +
            '(např. <em>Petr Abert — 14630</em>).</div>' });
      }

      var ukoly = mojeUkoly();
      var rows = ukoly.filter(function (x) {
        if (!fPlocha.q) return true;
        var hay = (x.z.cislo + ' ' + x.z.zadatel.nazev + ' ' + typLabel(x.z.typ)).toLowerCase();
        return hay.indexOf(fPlocha.q.toLowerCase()) >= 0;
      }).map(function (x) {
        var z = x.z, p = posouzeniUtvaru(z, u.utvar);
        var dl = delegaceProUtvar(z, u.utvar).filter(function (d) { return d.d.stav === 'CEKA'; });
        var lhuta = dl.length ? dl[0].d.lhuta : (p ? p.lhuta : '');
        var blizi = poLhute(lhuta);
        return {
          akce: abtn('open-detail', z.id, 'detail', 'Otevřít detail k posouzení', 'outline-primary'),
          cislo: '<strong>' + esc(z.cislo) + '</strong>',

          typ: esc(typLabel(z.typ)),
          termin: fmtD(z.terminOd),
          stav: stavChip(z.stav),
          role: D.renderBadge({ label: x.role, variant: x.role.indexOf('Podpůrný') >= 0 ? 'warn' : 'info' }),
          lhuta: lhuta ? fmtD(lhuta) : '—',
          blizi: blizi ? mark(D.renderBadge({ label: 'po lhůtě', variant: 'error' }),
            '[ÚVAHA] Příznak blížící se / překročené lhůty. Konkrétní lhůty workflow analýza nestanovuje (ot. #2).')
            : '<span class="inw-muted">—</span>'
        };
      });
      var grid = D.renderDataGrid({
        columns: [
          { key: 'akce', label: 'Akce', html: true },

          { key: 'zadatel', label: 'Žadatel' },
          { key: 'typ', label: 'Typ zkoušky' },
          { key: 'termin', label: 'Termín zkoušky' },
          { key: 'stav', label: 'Stav', html: true },
          { key: 'role', label: 'Moje role', html: true },
          { key: 'lhuta', label: 'Lhůta', html: true },
          { key: 'blizi', label: 'Termín', html: true }

        emptyText: 'Nemáte žádné žádosti k posouzení.'

      var toolbar = '<div class="inw-toolbar">' +

          ic('user') + '<span style="flex:1">Máte nastavenu zastupitelnost — vaše úkoly přebírá ' +
          '<strong>' + esc(zn ? zn.name : State.zastup.zastupceKey) + '</strong> v období ' +
          fmtD(State.zastup.od) + ' – ' + fmtD(State.zastup.do) + '.</span>' +

    function typLabelMulti(t) {

          id: '<strong>' + esc(p.id) + '</strong>',

        'Analýza (třída L0010 <em>Pravidlo určení schvalovatelů</em>) výslovně uvádí, že konkrétní sada ' +
        'pravidel — skladba, pořadí schvalovatelů a lhůty — není v zadání specifikována (otevřené otázky #1, #2). ' +
        'Pravidla níže jsou doplněna z dokumentu <em>Identifikace účastníků workflow.xlsx</em> a z odborné úvahy, ' +
        'aby prototyp mohl automatické určení schvalovatelů (FR0003) předvést.</div>';
      var note = '<p style="margin:0;font-size:13px;color:var(--dsz-text-muted)">' +
        '<strong>Pozn.:</strong> Dokument <em>Identifikace účastníků workflow.xlsx</em> uvádí navíc typ ' +
        '„Black startové zkoušky", který číselník analýzy <em>typZkousky_E</em> (6 typů dle REQ_WF_002) ' +
        'neobsahuje (otevřená otázka #3). Prototyp se drží 6 typů dle analýzy.</p>';

      return D.renderPageHeader({
        title: 'Pravidla určení schvalovatelů',
        subtitle: 'Sada pravidel, podle které aplikace po podání žádosti automaticky určí okruh schvalovatelů (FR0003).',
        crumbs: [{ label: 'DSZEZ' }, { label: 'Pravidla schvalování', active: true }]
      }) +
      '<div class="dsz-stack">' + intro +
        markBlock(D.renderCard({ title: 'Routovací pravidla schvalovacího workflow',
          subtitle: 'Vstup: typ zkoušky + požadavek na manipulace v rozvodnách', body: pravGrid }),
          '[ZDROJ] Routovací pravidla doplněna dle Identifikace účastníků workflow.xlsx a úvahy (ot. #1, #2).') +
        markBlock(D.renderCard({ title: 'Organizační útvary ve schvalovacím workflow',

    /* ================================================================
       16. POHLED: DETAIL ŽÁDOSTI  (G0011–G0015 + workflow timeline)
       ================================================================ */
    /* zvýraznění změněného pole u upravené žádosti (analýza G0012 atr. 7) */
    function sv(z, fld, val) {
      var v = esc(val == null || val === '' ? '—' : val);
      return z.zmeneno.indexOf(fld) >= 0 ? '<span class="dsz-changed">' + v + '</span>' : v;
    }
    function mojeDelegaceOpen(z) {
      if (!cu().utvar) return null;
      var dl = delegaceProUtvar(z, cu().utvar).filter(function (x) { return x.d.stav === 'CEKA'; });
      return dl.length ? dl[0] : null;
    }

    function viewDetail(id) {
      var z = findZ(id);
      if (!z) { go('#/portal'); return ''; }
      var u = cu();
      var mojeP = u.utvar ? posouzeniUtvaru(z, u.utvar) : null;
      var mojeD = mojeDelegaceOpen(z);
      var muzuRozhodnout = z.stav === 'VE_SCHVALOVANI' && mojeP && mojeP.vysledek === 'CEKA';

      /* --- akce v hlavičce --- */
      var akce = D.button({ label: 'Zpět', variant: 'ghost', icon: 'back', attrs: ' data-act="nav-plocha-back"' });
      if (muzuRozhodnout)
        akce = D.button({ label: 'Rozhodnout o žádosti', variant: 'primary', icon: 'approve', attrs: ' data-act="open-rozhodnuti" data-id="' + z.id + '"' }) +
          ' ' + D.button({ label: 'Delegovat posouzení', variant: 'secondary', icon: 'delegate', attrs: ' data-act="open-delegace" data-id="' + z.id + '"' }) +
          ' ' + akce;
      if (u.kind === 'ZADATEL') {
        var za = '';
        if (['VE_SCHVALOVANI', 'SCHVALENA', 'ZAMITNUTA'].indexOf(z.stav) >= 0)
          za += D.button({ label: 'Upravit žádost', variant: 'secondary', icon: 'edit', attrs: ' data-act="edit-zadost" data-id="' + z.id + '"' }) + ' ';
        if (z.stav === 'SCHVALENA')
          za += mark(D.button({ label: 'Označit zkoušku jako provedenou', variant: 'outline-primary', icon: 'check', attrs: ' data-act="oznacit-provedena" data-id="' + z.id + '"' }),
            '[ÚVAHA] Mechanismus zjištění provedení zkoušky není v zadání určen (ot. #16). Doplněna ruční akce.') + ' ';
        if (z.stav === 'ZKOUSKA_PROVEDENA' && !z.vyhodnoceni && State.vyhEdit !== z.id)
          za += D.button({ label: 'Vytvořit vyhodnocení', variant: 'primary', icon: 'edit', attrs: ' data-act="start-vyhodnoceni" data-id="' + z.id + '"' }) + ' ';
        akce = za + akce;
      }
      if (u.kind === 'SCHVALOVATEL' && z.vyhodnoceni && z.vyhodnoceni.stav === 'ke_kontrole' && z.stav === 'ZKOUSKA_PROVEDENA')

      /* --- souhrn žádosti G0012 --- */
      var souhrnItems = [
        { label: 'Typ zkoušky', value: typLabel(z.typ) },
        { label: 'Termín zkoušky', value: sv(z, 'terminOd', fmtDT(z.terminOd)) + ' — ' + sv(z, 'terminDo', fmtDT(z.terminDo)), html: true },
        { label: 'Program zkoušky', value: '<div style="white-space:pre-wrap">' + (z.zmeneno.indexOf('program') >= 0 ? '<span class="dsz-changed">' + esc(z.program) + '</span>' : esc(z.program)) + '</div>', html: true },
        { label: 'Vyžaduje součinnost ČEPS', value: z.vyzadujeSoucinnost ? 'Ano' : 'Ne' },
        { label: 'Popis součinnosti', value: '<div style="white-space:pre-wrap">' + (z.zmeneno.indexOf('popisSoucinnosti') >= 0 ? '<span class="dsz-changed">' + esc(z.popisSoucinnosti || '—') + '</span>' : esc(z.popisSoucinnosti || '—')) + '</div>', html: true },
        { label: 'Manipulace v rozvodnách', value: z.vyzadujeManipulace ? 'Ano' : 'Ne' }

      Object.keys(z.poleTyp).forEach(function (k) {

          souhrnItems.push({ label: (lbl ? lbl.label : k), value: z.poleTyp[k] });

      if (z.prilohy.length) souhrnItems.push({ label: 'Přílohy', html: true,
        value: z.prilohy.map(function (p) { return ic('file') + ' ' + esc(p.nazev) +
          ' <a data-act="stub-download" style="cursor:pointer">stáhnout</a>'; }).join('<br>') });
      var changeNote = z.zmeneno.length
        ? '<p style="margin:0 0 12px"><span class="dsz-changed">žlutě</span> jsou vyznačena pole změněná oproti předchozí verzi žádosti (analýza G0012 / FR0007).</p>'
        : '';
      var souhrn = D.renderCard({ title: 'Souhrn žádosti', subtitle: 'Read-only podklad pro posouzení (G0012)',
        collapsible: true, body: changeNote + D.renderKv({ items: souhrnItems }) });

      /* --- workflow timeline --- */
      var maGrem = z.beh.posouzeni.some(function (p) { return p.gremialka; });
      var steps = z.beh.posouzeni.map(function (p) {
        var meta = [];
        if (p.lhuta) meta.push('Lhůta ' + fmtD(p.lhuta));
        if (p.datumRozhodnuti) meta.push('Rozhodnuto ' + fmtDT(p.datumRozhodnuti));
        if (p.gremialka) meta.push('Projednání na gremiální poradě');
        var com = '';
        if (p.oduvodneni) com += p.oduvodneni;
        if (p.dodatecnePodminky) com += (com ? '\n\n' : '') + 'Dodatečné podmínky realizace: ' + p.dodatecnePodminky;
        return {
          title: utvarNazev(p.utvar), role: utvarOsoba(p.utvar),
          status: posStatus(p), meta: meta.join('  ·  '), comment: com,
          delegations: p.delegace.map(function (d) {
            return { label: 'Delegace → ' + utvarNazev(d.utvar),
              meta: (d.stav === 'CEKA' ? 'Čeká na vyjádření · lhůta ' + fmtD(d.lhuta) : 'Vyjádřeno ' + fmtDT(d.datumVyjadreni)),
              body: 'Pokyn: ' + d.pokyn + (d.vyjadreni ? '\n\nVyjádření podpůrného útvaru: ' + d.vyjadreni : '') };
          })
        };
      });
      var wfBody = (z.beh.posouzeni.length
          ? D.renderTimeline({ steps: steps })

        (maGrem ? '<div style="margin-top:14px">' + markBlock(

          '[ZDROJ] Gremiální porada doplněna dle BA dokumentu kap. 5.2.3 a dotazu č. 6 v Identifikace účastníků workflow.xlsx.') + '</div>' : '');
      var workflow = D.renderCard({

      /* --- komentáře a vyjádření G0013 --- */
      var thread = z.beh.komentare.length ? '<div class="dsz-thread">' + z.beh.komentare.map(function (k) {
        var cls = 'dsz-msg' + (k.zruseny ? ' dsz-msg--retired' : '') +

        return '<div class="' + cls + '"><div class="dsz-msg-head">' +

        vyhCard = D.renderCard({ title: 'Vyhodnocení provedené zkoušky',

      } else if (z.vyhodnoceni) {
        var v = z.vyhodnoceni;
        var stavLbl = v.stav === 'prijate' ? D.renderBadge({ label: 'Přijaté', variant: 'ok' })

        var vBody = D.renderKv({ items: [

          { label: 'Podklady', html: true, value: v.podklady.length ? v.podklady.map(function (p) { return ic('file') + ' ' + esc(p.nazev); }).join('<br>') : '<span class="inw-muted">—</span>' }

        vyhCard = D.renderCard({ title: 'Vyhodnocení provedené zkoušky', subtitle: 'Oblast G0015', collapsible: true, body: vBody });

      /* --- auditní stopa G0014 --- */
      var auditGrid = D.renderDataGrid({
        columns: [

          { key: 'ucastnik', label: 'Účastník' },
          { key: 'udalost', label: 'Událost' },
          { key: 'vysledek', label: 'Výsledek', html: true }
        ],
        rows: z.beh.audit.slice().reverse().map(function (a) {
          return { cas: fmtDT(a.cas), ucastnik: a.ucastnik, udalost: a.udalost,
            vysledek: a.vysledek ? D.renderBadge({ label: a.vysledek, variant: a.vysledek === 'SCHVALENO' ? 'ok' : 'error' }) : '' };
        }),
        emptyText: 'Zatím žádné události.'
      });

      /* --- pravý sloupec: rychlé info --- */
      var info = D.renderKv({ items: [
        { label: 'Číslo žádosti', value: z.cislo || '(rozpracováno)' },
        { label: 'Stav žádosti', value: stavChip(z.stav), html: true },
        { label: 'Žadatel', value: z.zadatel.nazev },
        { label: 'Kontaktní osoba', value: z.zadatel.kontakt },
        { label: 'Kontaktní e-mail', value: z.zadatel.email },

      var left = '<div class="dsz-stack">' + souhrn + workflow + komentare + vyhCard + '</div>';
      var right = '<div class="dsz-stack">' +

      return D.renderPageHeader({

    /* ================================================================

    function openDialog(o) {
      var host = document.getElementById('modal-host');
      host.innerHTML = D.renderModal({ id: o.id, title: o.title, body: o.body, footer: o.footer, size: o.size });
      D.openModal(o.id);
      var bd = D.$('[data-modal="' + o.id + '"]');
      bd.addEventListener('click', function (e) {
        if (e.target === bd || e.target.closest('.inw-modal-close')) closeDialog();
      });
    }
    function closeDialog() { document.getElementById('modal-host').innerHTML = ''; }
    function mval(name) { var el = D.$('#modal-host [data-mfld="' + name + '"]'); return el ? (el.type === 'checkbox' ? el.checked : el.value) : ''; }
    function mfield(o) {  /* pole uvnitř modálu (data-mfld) */
      o = o || {}; var ctrl, v = o.value || '';
      if (o.type === 'select')
        ctrl = '<select data-mfld="' + o.name + '"><option value="">— vyberte —</option>' +
          o.options.map(function (op) { return '<option value="' + esc(op.value) + '">' + esc(op.label) + '</option>'; }).join('') + '</select>';
      else if (o.type === 'textarea')
        ctrl = '<textarea data-mfld="' + o.name + '"' + (o.rows ? ' style="min-height:' + (o.rows * 22) + 'px"' : '') + '>' + esc(v) + '</textarea>';
      else ctrl = '<input type="' + (o.type || 'text') + '" data-mfld="' + o.name + '" value="' + esc(v) + '">';
      return '<div class="inw-field inw-field-full' + (o.mark ? ' dsz-mark' : '') + '"' + (o.mark ? ' title="' + esc(o.mark) + '"' : '') + '>' +
        (o.mark ? chip : '') + '<label>' + esc(o.label) + (o.required ? ' <span class="inw-req">povinné</span>' : '') + '</label>' +
        ctrl + (o.hint ? '<span class="inw-hint">' + esc(o.hint) + '</span>' : '') + '</div>';
    }
    function ftrCancel(okHtml) {
      return okHtml + ' ' + D.button({ label: 'Zrušit', variant: 'ghost', attrs: ' data-act="close-modal"' });
    }

    /* ================================================================
       18. WORKFLOW LOGIKA + AKCE
       ================================================================ */
    function nowIso() { return new Date().toISOString().slice(0, 16); }
    function lhutaDni(n) { var d = new Date(); d.setDate(d.getDate() + n); return d.toISOString().slice(0, 10); }
    var UTVAR_ROLE = { '14630': 'ABERT', '18230': 'CERNANOVA', '18232': 'HABA', '13232': 'KACIROVA' };
    function notify(roles, ikona, text) {
      NOTIFIKACE.unshift({ id: 'n' + Date.now(), proRole: roles, ikona: ikona, text: text, cas: nowIso(), unread: true });
    }
    function audit(z, ucastnik, udalost, vysl) {
      z.beh.audit.push({ cas: nowIso(), ucastnik: ucastnik, udalost: udalost, vysledek: vysl || '' });
    }
    function buildPosouzeni(typ, manip) {
      return urciSchvalovatele(typ, manip).map(function (c) {
        var grem = PRAVIDLA.some(function (p) {
          return p.utvar === c && p.gremialka && (p.typ === '*' || p.typ.split('|').indexOf(typ) >= 0);
        });
        return P(c, 'CEKA', { lhuta: lhutaDni(pravidloLhuta(typ, c)), gremialka: grem });
      });
    }
    function spustWorkflow(z, novyBeh) {
      z.beh.poradi = novyBeh ? z.beh.poradi + 1 : 1;
      z.beh.posouzeni = buildPosouzeni(z.typ, z.vyzadujeManipulace);
      z.stav = 'VE_SCHVALOVANI';
      var utv = z.beh.posouzeni.map(function (p) { return p.utvar; });
      audit(z, 'Aplikace', 'Určen okruh schvalovatelů: ' + utv.join(', ') + ', spuštěno workflow');
      var roles = utv.map(function (u) { return UTVAR_ROLE[u]; }).filter(Boolean);
      notify(roles, 'workflow', 'Nová žádost ' + z.cislo + ' k posouzení (' + typLabel(z.typ).toLowerCase() + ').');
    }
    /* vyhodnotí, zda je celé workflow dokončené */
    function prepocitejStav(z) {
      var ps = z.beh.posouzeni;
      if (ps.some(function (p) { return p.vysledek === 'ZAMITNUTO'; })) {
        z.stav = 'ZAMITNUTA';
        audit(z, 'Aplikace', 'Žádost zamítnuta – workflow ukončeno');
        notify(['ZADATEL'], 'reject', 'Žádost ' + z.cislo + ' byla zamítnuta.');
        return;
      }
      if (ps.every(function (p) { return p.vysledek === 'SCHVALENO'; })) {
        z.stav = 'SCHVALENA';
        audit(z, 'Aplikace', 'Všichni schvalovatelé schválili – žádost je SCHVÁLENÁ');
        audit(z, 'Aplikace', 'Údaje o schválené zkoušce předány do AŘP');
        notify(['ZADATEL'], 'approve', 'Žádost ' + z.cislo + ' byla schválena.');
      }
    }

    /* ---- validace a podání žádosti ---- */
    function validujForm(f) {
      var e = {}, req = { zadatelNazev: 1, zarizeni: 1, kontakt: 1, email: 1, terminOd: 1, terminDo: 1, program: 1 };
      poleTypu(f.typ).forEach(function (o) { if (o.required) req[o.name] = 1; });
      Object.keys(req).forEach(function (k) { if (!String(f[k] || '').trim()) e[k] = 'Povinné pole.'; });
      if (f.vyzadujeSoucinnost && !String(f.popisSoucinnosti || '').trim())
        e.popisSoucinnosti = 'Při požadované součinnosti ČEPS je popis povinný.';
      if (f.terminOd && f.terminDo && f.terminDo < f.terminOd)
        e.terminDo = 'Termín „do" musí být po termínu „od".';
      if (!f.souhlas) e.souhlas = 'Bez potvrzení souhlasu s podmínkami nelze žádost podat.';
      return e;
    }
    function formToZ(z, f) {
      z.typ = f.typ; z.zarizeni = f.zarizeni; z.lokalita = f.lokalita;
      z.zadatel.nazev = f.zadatelNazev; z.zadatel.kontakt = f.kontakt; z.zadatel.email = f.email;
      z.terminOd = f.terminOd; z.terminDo = f.terminDo; z.program = f.program;
      z.vyzadujeSoucinnost = f.vyzadujeSoucinnost; z.popisSoucinnosti = f.popisSoucinnosti;
      z.vyzadujeManipulace = f.vyzadujeManipulace; z.citlivost = f.citlivost; z.souhlas = f.souhlas;
      z.prilohy = f.prilohy.slice(); z.poleTyp = {};
      poleTypu(f.typ).forEach(function (o) { z.poleTyp[o.name] = f[o.name] || ''; });
    }
    function submitZadost(force) {
      var f = State.form;
      Object.keys(readForm()).forEach(function (k) { f[k] = readForm()[k]; });
      var e = validujForm(f);
      State.formErrors = e;
      if (Object.keys(e).length) { render();
        toast('Žádost obsahuje chyby — zkontrolujte zvýrazněná pole.', 'error'); return; }
      /* alt 9a – upozornění na nevyplněná nepovinná pole */
      if (!force && !String(f.lokalita || '').trim()) {
        confirmDialog({ title: 'Nevyplněná nepovinná pole',
          msg: 'Nepovinné pole „Lokalita / rozvodna" není vyplněno. Doporučujeme je doplnit — neúplné informace mohou vést k zamítnutí zkoušky. Přejete si přesto žádost podat?',
          ok: 'Podat i tak', variant: 'primary', act: 'submit-zadost-force' });

      }
      var z;
      if (State.formMode === 'draft') { z = State.formZ; }
      else if (State.formMode === 'nova') {
        z = { id: 'z' + Date.now(), cislo: '', nazev: '', typ: f.typ, stav: 'ROZPRACOVANA',
          zadatel: { nazev: '', kontakt: '', email: '', interni: false }, zarizeni: '', lokalita: '',
          terminOd: '', terminDo: '', program: '', vyzadujeSoucinnost: true, popisSoucinnosti: '',
          vyzadujeManipulace: false, citlivost: 'INTERNI', souhlas: false, datumPodani: '',
          poleTyp: {}, prilohy: [], zmeneno: [],

        ZADOSTI.unshift(z);
      }

    function ulozRozpracovane(nazev) {

      var z;
      if (State.formMode === 'draft') { z = State.formZ; }
      else {
        z = { id: 'z' + Date.now(), cislo: '', nazev: '', typ: f.typ, stav: 'ROZPRACOVANA',
          zadatel: { nazev: '', kontakt: '', email: '', interni: false }, zarizeni: '', lokalita: '',
          terminOd: '', terminDo: '', program: '', vyzadujeSoucinnost: true, popisSoucinnosti: '',
          vyzadujeManipulace: false, citlivost: 'INTERNI', souhlas: false, datumPodani: '',
          poleTyp: {}, prilohy: [], zmeneno: [],

    function ulozZmeny() {
      var z = State.formZ, f = State.form;
      Object.keys(readForm()).forEach(function (k) { f[k] = readForm()[k]; });
      var e = validujForm(f);
      State.formErrors = e;
      if (Object.keys(e).length) { render(); toast('Žádost obsahuje chyby.', 'error'); return; }
      var sled = ['zarizeni', 'lokalita', 'terminOd', 'terminDo', 'program', 'popisSoucinnosti'];
      z.zmeneno = sled.filter(function (k) {
        var orig = k === 'zarizeni' ? z.zarizeni : (k === 'lokalita' ? z.lokalita : z[k]);
        return String(orig || '') !== String(f[k] || '');
      });
      z.beh.komentare.forEach(function (k) { k.zruseny = true; });
      formToZ(z, f);
      audit(z, 'Žadatel', 'Žádost změněna – zrušen předchozí běh workflow, založen nový (běh ' + (z.beh.poradi + 1) + ')');
      audit(z, 'Aplikace', 'Schvalovatelům vyznačeny změny oproti původní žádosti');
      spustWorkflow(z, true);
      State.form = null; State.formKey = null;
      toast('Žádost ' + z.cislo + ' byla upravena, spuštěno nové schvalovací workflow.', 'success');

    /* jednoduchá hláška (toast) */
    function toast(msg, kind) {
      var t = document.createElement('div');
      t.style.cssText = 'position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:200;' +
        'padding:11px 18px;border-radius:6px;color:#fff;font-size:13px;font-weight:600;box-shadow:var(--dsz-shadow-modal);' +
        'background:' + (kind === 'error' ? 'var(--dsz-danger)' : (kind === 'success' ? 'var(--dsz-success)' : 'var(--dsz-primary-dark)'));
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(function () { t.style.transition = 'opacity .4s'; t.style.opacity = '0'; }, 2600);
      setTimeout(function () { t.remove(); }, 3100);
    }

    /* ================================================================
       19. OBSLUHA UDÁLOSTÍ
       ================================================================ */
    function handleAct(act, el) {
      var id = el.getAttribute('data-id');
      if (act !== 'toggle-notif') State.pop = null;
      switch (act) {
        case 'toggle-marks': State.marks = !State.marks; render(); break;
        case 'toggle-notif':
          if (State.pop === 'notif') {
            NOTIFIKACE.forEach(function (n) { if (n.proRole.indexOf(State.identity) >= 0) n.unread = false; });
            State.pop = null;
          } else State.pop = 'notif';
          render(); break;
        case 'new-zadost': openTypModal(); break;
        case 'confirm-typ':
          var tr = D.$('#modal-host input[name="mtyp"]:checked');
          if (!tr) { toast('Vyberte typ zkoušky.', 'error'); break; }
          State.newTyp = tr.value; State.formKey = null; closeDialog(); go('#/zadost/nova'); break;
        case 'open-detail': go('#/detail/' + id); break;
        case 'continue-draft': case 'edit-zadost': State.formKey = null; go('#/zadost/' + id); break;
        case 'nav-portal': State.form = null; State.formKey = null; go('#/portal'); break;
        case 'nav-plocha-back': go(cu().kind === 'ZADATEL' ? '#/portal' : '#/plocha'); break;
        case 'discard-form': State.form = null; State.formKey = null;
          go(cu().kind === 'ZADATEL' ? '#/portal' : '#/plocha'); break;
        case 'add-priloha': syncForm();
          State.form.prilohy.push({ nazev: 'Příloha_' + (State.form.prilohy.length + 1) + '.pdf',
            velikost: 120000 + Math.floor(Math.random() * 600000) }); render(); break;
        case 'rm-priloha': syncForm();
          State.form.prilohy.splice(parseInt(el.getAttribute('data-idx'), 10), 1); render(); break;
        case 'submit-zadost': submitZadost(false); break;
        case 'submit-zadost-force': closeDialog(); submitZadost(true); break;
        case 'save-draft': syncForm();
          openTextModal({ id: 'm-name', title: 'Uložit rozpracovanou žádost', field: 'text',
            label: 'Název rozpracované žádosti', ok: 'Uložit', act: 'confirm-save-draft',
            intro: 'Pojmenujte rozpracovanou žádost, ať ji snadno najdete na portálu.' }); break;
        case 'confirm-save-draft':
          var nm = mval('txt'); if (!String(nm).trim()) { toast('Zadejte název.', 'error'); break; }
          closeDialog(); ulozRozpracovane(String(nm).trim()); break;
        case 'save-changes': syncForm();
          confirmDialog({ title: 'Změna žádosti', ok: 'Uložit změny a znovu podat', act: 'confirm-save-changes',
            msg: 'Úprava žádosti je nevratná operace — zruší dosavadní průběh schvalování (i částečné nebo úplné schválení) a spustí nové schvalovací workflow. Přejete si pokračovat?' }); break;
        case 'confirm-save-changes': closeDialog(); ulozZmeny(); break;
        case 'open-rozhodnuti': openRozhodnutiModal(id); break;
        case 'do-schvalit': rozhodni(id, 'SCHVALENO'); break;
        case 'do-zamitnout': rozhodni(id, 'ZAMITNUTO'); break;
        case 'open-delegace': openDelegaceModal(id); break;
        case 'do-delegovat': delegovat(id); break;
        case 'zapsat-komentar': zapsatKomentar(id); break;
        case 'zapsat-vyjadreni': zapsatVyjadreni(id); break;
        case 'oznacit-provedena':
          confirmDialog({ title: 'Označit zkoušku jako provedenou', ok: 'Označit jako provedenou',
            act: 'confirm-provedena', dataId: id,
            msg: 'Potvrzujete, že schválená zkouška byla fyzicky provedena? Poté bude možné vytvořit její vyhodnocení.' }); break;
        case 'confirm-provedena':
          var zp = findZ(id); zp.stav = 'ZKOUSKA_PROVEDENA';
          audit(zp, cu().name, 'Zkouška označena jako provedená');
          closeDialog(); toast('Zkouška byla označena jako provedená.', 'success'); render(); break;
        case 'start-vyhodnoceni':
          State.vyhEdit = id; State.vyhReakce = false; State.vyhText = ''; State.vyhPodklady = [];
          render(); break;
        case 'react-vyhrady':
          var zrv = findZ(id);
          State.vyhEdit = id; State.vyhReakce = true;
          State.vyhText = zrv.vyhodnoceni.text;
          State.vyhPodklady = zrv.vyhodnoceni.podklady.slice();
          render(); break;
        case 'cancel-vyhodnoceni':
          State.vyhEdit = null; State.vyhReakce = false; State.vyhText = ''; State.vyhPodklady = [];
          render(); break;
        case 'add-vyh-podklad':
          var elv = D.$('#app [data-fld="vyh-text"]'); if (elv) State.vyhText = elv.value;
          State.vyhPodklady.push({ nazev: 'Podklad_' + (State.vyhPodklady.length + 1) + '.pdf',
            velikost: 120000 + Math.floor(Math.random() * 600000) }); render(); break;
        case 'rm-vyh-podklad':
          var elw = D.$('#app [data-fld="vyh-text"]'); if (elw) State.vyhText = elw.value;
          State.vyhPodklady.splice(parseInt(el.getAttribute('data-idx'), 10), 1); render(); break;
        case 'odeslat-vyhodnoceni': odeslatVyhodnoceni(id); break;
        case 'open-vyhrady':
          openTextModal({ id: 'm-vyhrady', title: 'Výhrady ČEPS k vyhodnocení', label: 'Výhrady k vyhodnocení zkoušky',
            ok: 'Zapsat výhrady', variant: 'outline-danger', act: 'save-vyhrady', dataId: id,
            intro: 'Výhrady budou zaslány subjektu zkoušky k vypořádání.' }); break;
        case 'save-vyhrady': saveVyhrady(id); break;
        case 'schvalit-vyhodnoceni':
          confirmDialog({ title: 'Schválit přijetí vyhodnocení', ok: 'Schválit a archivovat', variant: 'success',
            act: 'confirm-schvalit-vyh', dataId: id,
            msg: 'Schválením přijetí řádného vyhodnocení bude celý objekt zkoušky (žádost, workflow, vyhodnocení) archivován. Pokračovat?' }); break;
        case 'confirm-schvalit-vyh': schvalitVyhodnoceni(id); break;
        case 'open-zastup': openZastupModal(); break;
        case 'save-zastup':
          var zk = mval('zastupce'), zod = mval('od'), zdo = mval('do');
          if (!zk || !zod || !zdo) { toast('Vyplňte všechna pole.', 'error'); break; }
          if (zdo < zod) { toast('Platnost „do" musí být po platnosti „od".', 'error'); break; }
          State.zastup = { zastoupeny: State.identity, zastupceKey: zk, od: zod, do: zdo };
          closeDialog(); toast('Zastupitelnost byla nastavena.', 'success'); render(); break;
        case 'zrusit-zastup':
          State.zastup = null; toast('Zastupitelnost byla zrušena.', 'info'); render(); break;
        case 'close-modal': closeDialog(); break;
        case 'stub-download': toast('Stažení souboru – simulace prototypu.', 'info'); break;
        default: break;
      }
    }

    function clickHandler(e) {
      var nav = e.target.closest('[data-nav]');
      if (nav) {
        var m = { portal: '#/portal', plocha: '#/plocha', pravidla: '#/pravidla' };
        State.form = null; State.formKey = null; go(m[nav.getAttribute('data-nav')]); return;
      }
      var a = e.target.closest('[data-act]');
      if (a) { handleAct(a.getAttribute('data-act'), a); return; }
      if (State.pop && !e.target.closest('.dsz-pop') && !e.target.closest('[data-act="toggle-notif"]')) {
        State.pop = null; render();
      }
    }
    function changeHandler(e) {
      var t = e.target;
      if (t.getAttribute('data-act') === 'set-role') {
        State.identity = t.value; State.formKey = null; State.form = null; State.pop = null;
        var home = cu().kind === 'ZADATEL' ? '#/portal' : (cu().kind === 'SPRAVCE' ? '#/pravidla' : '#/plocha');
        State.route = home;
        if (location.hash === home) render(); else location.hash = home;
        return;
      }
      var flt = t.getAttribute('data-flt');
      if (flt === 'portal-q') { fPortal.q = t.value; render(); }
      else if (flt === 'portal-stav') { fPortal.stav = t.value; render(); }
      else if (flt === 'plocha-q') { fPlocha.q = t.value; render(); }
      if (t.name === 'mtyp') {
        D.$$('#modal-host .dsz-typecard').forEach(function (c) {
          c.classList.toggle('is-sel', !!c.querySelector('input:checked'));
        });
      }
    }

    /* ================================================================
       20. START
       ================================================================ */
    window.addEventListener('hashchange', route);
    document.body.addEventListener('click', clickHandler);
    document.body.addEventListener('change', changeHandler);
    if (!location.hash) location.hash = '#/portal';
    route();
  })();
  </script>
</body>
</html>
